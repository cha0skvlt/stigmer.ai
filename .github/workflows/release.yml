name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/cha0skvlt/kaban.ai

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}-backend
            ${{ env.IMAGE_NAME }}:latest-backend

      - name: Build and push nginx (UI baked in)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.nginx
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}-nginx
            ${{ env.IMAGE_NAME }}:latest-nginx

      - name: Render release compose
        run: |
          sed "s/__VERSION__/${VERSION}/g" docker-compose.release.yml.template > docker-compose.release.yml

      - name: Extract changelog
        id: changelog
        run: |
          awk -v ver="${VERSION}" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "Release ${VERSION}" > release-notes.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          name: v${{ env.VERSION }}
          body_path: release-notes.md
          files: docker-compose.release.yml
          generate_release_notes: false
