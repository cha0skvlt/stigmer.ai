# KABAN AI — production compose (pre-built images from GHCR)
# Requires Docker only — no Python, no make.
#
#   curl -fsSL https://raw.githubusercontent.com/cha0skvlt/kaban.ai/v1.0.2/.env.example -o .env
#   curl -fsSL https://github.com/cha0skvlt/kaban.ai/releases/download/v1.0.2/docker-compose.release.yml -o docker-compose.yml
#   docker compose up -d
#
# Images: https://github.com/cha0skvlt/kaban.ai/pkgs/container/kaban.ai

services:
  backend:
    image: ghcr.io/cha0skvlt/kaban.ai:1.0.2-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BOARD_STORE_PATH: /app/data/board_store.json
    volumes:
      - kaban-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: ghcr.io/cha0skvlt/kaban.ai:1.0.2-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  kaban-data:
