services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kaban
      POSTGRES_USER: kaban
      POSTGRES_PASSWORD: kaban
    volumes:
      - kaban-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaban -d kaban"]
      interval: 2s
      timeout: 2s
      retries: 30

  backend:
    build: .
    env_file:
      - .env
    environment:
      # Default DSN when .env omits DATABASE_URL; do not use bare ${DATABASE_URL} (empty host var wipes .env).
      DATABASE_URL: ${DATABASE_URL:-postgresql://kaban:kaban@postgres:5432/kaban}
    volumes:
      - ./backend/data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/kanban.html:/usr/share/nginx/html/kanban.html:ro
      - ./frontend/css:/usr/share/nginx/html/css:ro
      - ./frontend/js:/usr/share/nginx/html/js:ro
      - ./img:/usr/share/nginx/html/img:ro
    depends_on:
      - backend

volumes:
  kaban-postgres-data:
