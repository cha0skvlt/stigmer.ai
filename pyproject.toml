[tool.black]
line-length = 100
target-version = ["py313"]
include = '\.pyi?$'

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B", "UP"]

[tool.ruff.lint.isort]
known-third-party = ["alembic", "sqlalchemy"]

[tool.ruff.lint.per-file-ignores]
"backend/agent.py" = ["E501"]
"backend/alembic/env.py" = ["I001"]
"test/*" = ["B011"]
